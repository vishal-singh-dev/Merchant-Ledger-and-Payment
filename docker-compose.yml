services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ledger
      POSTGRES_PASSWORD: ledger
      POSTGRES_DB: ledger
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ledger"]
      interval: 5s
      timeout: 5s
      retries: 20

  redpanda:
    image: redpandadata/redpanda:v24.2.18
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - "1G"
      - --reserve-memory
      - "0M"
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr
      - PLAINTEXT://localhost:9092
    ports:
      - "9092:9092"
      - "9644:9644"

  redpanda-console:
    image: redpandadata/console:v2.7.2
    environment:
      KAFKA_BROKERS: localhost:9092
    ports:
      - "8080:8080"
    depends_on:
      - redpanda

  localstack:
    image: localstack/localstack:3.8
    environment:
      - SERVICES=sqs
      - DEBUG=1
      - AWS_DEFAULT_REGION=us-east-1
    ports:
      - "4566:4566"

  app-api:
    image: python:3.12-slim
    working_dir: /src
    volumes:
      - ./:/src
    command: sh -c "pip install -r requirements.txt && alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    environment:
      DATABASE_URL: postgresql+psycopg://ledger:ledger@postgres:5432/ledger
      KAFKA_BOOTSTRAP_SERVERS: localhost:9092
      LOCALSTACK_ENDPOINT_URL: http://localstack:4566
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  outbox-worker:
    image: python:3.12-slim
    working_dir: /src
    volumes:
      - ./:/src
    command: sh -c "pip install -r requirements.txt && python -m app.workers.outbox_publisher"
    environment:
      DATABASE_URL: postgresql+psycopg://ledger:ledger@postgres:5432/ledger
      KAFKA_BOOTSTRAP_SERVERS: localhost:9092
      LOCALSTACK_ENDPOINT_URL: http://localstack:4566
    depends_on:
      postgres:
        condition: service_healthy

  processor-worker:
    image: python:3.12-slim
    working_dir: /src
    volumes:
      - ./:/src
    command: sh -c "pip install -r requirements.txt && python -m app.workers.processor"
    environment:
      DATABASE_URL: postgresql+psycopg://ledger:ledger@postgres:5432/ledger
      KAFKA_BOOTSTRAP_SERVERS: localhost:9092
      LOCALSTACK_ENDPOINT_URL: http://localstack:4566
    depends_on:
      postgres:
        condition: service_healthy
